<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCC Quiz Mobile</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pentaspaikotabanjar.vercel.app/">
    <meta property="og:title" content="Pentas PAI Kota Banjar 2026 (Unofficial/Tidak Resmi dari Panitia)">
    <meta property="og:description" content="Petunjuk Teknis, Aturan, dan Informasi Pelaksanaan Pentas PAI Tingkat Kota Banjar Tahun 2026. Terdiri dari Mode Daring dan Luring. (Unofficial/Tidak Resmi dari Panitia)">
    <meta property="og:image" content="https://pentaspaikotabanjar.vercel.app/assets/image/banner.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #14532d; --bg: #f8fafc; --card-bg: #ffffff; --wrong: #ef4444; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            padding-bottom: 100px;
        }

        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            line-height: 2;
            direction: rtl;
        }

        .mobile-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
            background: var(--card-bg);
            overflow: hidden;
        }

        .card-header-mobile {
            padding: 12px 15px;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-tipe {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 5px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }
        .bg-paket-a { background: #dcfce7; color: #166534; }
        .bg-paket-b { background: #e0e7ff; color: #3730a3; }
        .bg-paket-c { background: #ffedd5; color: #9a3412; }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            color: #334155;
            transition: all 0.2s;
            position: relative;
            display: flex;
            align-items: flex-start;
        }
        
        .option-btn:hover:not(:disabled) { background-color: #f8fafc; cursor: pointer; }
        .option-btn:active:not(:disabled) { transform: scale(0.99); }
        .option-btn:disabled { cursor: default; }

        .option-label {
            font-weight: 700;
            min-width: 25px;
            margin-right: 8px;
            color: var(--primary);
        }

        .option-btn.correct { background-color: #dcfce7; border-color: #22c55e; color: #14532d; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .option-btn.correct .option-label { color: #14532d; }
        .option-btn.wrong .option-label { color: #991b1b; }

        .fab-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        .btn-generate {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            background: var(--primary);
            border: none;
            box-shadow: 0 8px 20px rgba(20, 83, 45, 0.3);
            color: white;
            transition: 0.3s;
        }
        .btn-generate:active { transform: translateX(-50%) scale(0.95); }
        .btn-generate:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-danger-custom { background: #dc3545; box-shadow: 0 8px 20px rgba(220, 53, 69, 0.3); }

        .divider-text {
            display: flex; align-items: center; text-align: center;
            color: #94a3b8; font-size: 11px; font-weight: 800;
            text-transform: uppercase; margin: 30px 0 10px 0; letter-spacing: 1px;
        }
        .divider-text::before, .divider-text::after { content: ''; flex: 1; border-bottom: 2px solid #e2e8f0; }
        .divider-text::before { margin-right: 1em; }
        .divider-text::after { margin-left: 1em; }

        .result-card { background: linear-gradient(135deg, #14532d 0%, #166534 100%); color: white; border-radius: 16px; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(20, 83, 45, 0.2); }
        .score-circle { width: 100px; height: 100px; background: white; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; margin: 0 auto 15px auto; }
    </style>
</head>
<body>

    <div class="bg-white sticky-top shadow-sm px-3 py-3 d-flex justify-content-between align-items-center">
        <h6 class="m-0 fw-bold text-success">
            <i class="fas fa-book-open me-2"></i>LCC Digital
        </h6>

        <div class="d-flex gap-2 align-items-center">
            <span class="badge bg-warning text-dark border rounded-pill" id="timer-badge">
                ⏱ 00:00
            </span>
            <span class="badge bg-light text-secondary border rounded-pill" id="score-badge">
                0 / 0
            </span>
        </div>
    </div>

    <div class="container mt-4 px-3" id="main-container">
        </div>

    <div class="fab-container d-none" id="fab-action">
        <button onclick="resetQuizConfirm()" class="btn-generate btn-danger-custom">
            <i class="fas fa-redo me-2"></i>RESET UJIAN
        </button>
    </div>

    <footer class="text-center py-4 text-muted border-top mt-5 bg-white">
        <div class="container">
            <p class="mb-2">Website Unofficial (Tidak Resmi) dari Panitia - Periksa Lagi pada Juknis langsung.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const SESSION_KEY = 'lcc_quiz_session';
        let timerInterval = null;
        let sessionData = null;

        // --- INISIALISASI ---
        window.onload = () => {
            const savedSession = localStorage.getItem(SESSION_KEY);
            if (savedSession) {
                sessionData = JSON.parse(savedSession);
                if (sessionData.isFinished) {
                    showResult();
                } else {
                    renderQuiz();
                    startTimer();
                }
            } else {
                showStartForm();
            }
        };

        // --- TAMPILAN FORM AWAL ---
        function showStartForm() {
            document.getElementById('fab-action').classList.add('d-none');
            document.getElementById('timer-badge').innerText = "⏱ 00:00";
            document.getElementById('score-badge').innerText = "0 / 0";
            
            const html = `
                <div class="mobile-card p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-graduate fa-3x text-success mb-3"></i>
                        <h4 class="fw-bold">Selamat Datang</h4>
                        <p class="text-muted small">Silakan isi data diri sebelum memulai ujian 30 soal acak.</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">Nama Lengkap</label>
                        <input type="text" id="input-nama" class="form-control form-control-lg" placeholder="Masukkan nama..." required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-secondary">Asal Sekolah</label>
                        <input type="text" id="input-sekolah" class="form-control form-control-lg" placeholder="Contoh: SDN 1 Banjar" required>
                    </div>
                    <button onclick="startNewQuiz()" id="btn-start" class="btn btn-success btn-lg w-100 fw-bold rounded-pill shadow-sm">
                        <i class="fas fa-play me-2"></i> MULAI UJIAN
                    </button>
                </div>
            `;
            document.getElementById('main-container').innerHTML = html;
        }

        // --- FETCH DATA JSON ---
        async function fetchQuestionsFromFile() {
            try {
                const response = await fetch('soal.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error("Gagal mengambil soal:", error);
                return null;
            }
        }

        function getRandomQuestions(sourceArray, count) {
            if (!sourceArray || sourceArray.length === 0) return [];
            return [...sourceArray].sort(() => 0.5 - Math.random()).slice(0, count);
        }

        // --- MULAI UJIAN BARU ---
        async function startNewQuiz() {
            const nama = document.getElementById('input-nama').value.trim();
            const sekolah = document.getElementById('input-sekolah').value.trim();
            const btn = document.getElementById('btn-start');

            if (!nama || !sekolah) {
                alert("Mohon isi Nama dan Asal Sekolah terlebih dahulu!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menyiapkan Soal...';

            const databaseSoal = await fetchQuestionsFromFile();

            if (!databaseSoal) {
                alert("Gagal memuat soal. Pastikan file soal.json tersedia.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play me-2"></i> MULAI UJIAN';
                return;
            }

            const soalTerpilih = getRandomQuestions(databaseSoal, 30);
            
            if (soalTerpilih.length === 0) {
                alert("Data soal kosong di dalam file json.");
                return;
            }

            // Simpan ke Local Storage
            sessionData = {
                nama: nama,
                sekolah: sekolah,
                startTime: Date.now(),
                endTime: null,
                questions: soalTerpilih,
                answers: {}, // Format: { "q-0": "A" }
                isFinished: false
            };
            
            saveSession();
            renderQuiz();
            startTimer();
        }

        // --- RENDER SOAL ---
        function renderQuiz() {
            document.getElementById('fab-action').classList.remove('d-none');
            const container = document.getElementById('main-container');
            
            let html = `
                <div class="alert alert-success border-0 shadow-sm mb-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="d-block text-success fw-bold">Peserta:</small>
                            <span class="fw-bold text-dark">${sessionData.nama}</span>
                        </div>
                        <div class="text-end">
                            <small class="d-block text-success fw-bold">Sekolah:</small>
                            <span class="fw-bold text-dark">${sessionData.sekolah}</span>
                        </div>
                    </div>
                </div>
                <div class="divider-text">Latihan 30 Soal Acak</div>
            `;

            let answeredCount = 0;
            let correctCount = 0;

            sessionData.questions.forEach((item, index) => {
                const uniqueId = `q-${index}`;
                const hasAnswered = sessionData.answers.hasOwnProperty(uniqueId);
                const userAnswer = hasAnswered ? sessionData.answers[uniqueId] : null;
                const isCorrect = hasAnswered && (userAnswer.toUpperCase() === item.kunci.toUpperCase());

                if (hasAnswered) {
                    answeredCount++;
                    if (isCorrect) correctCount++;
                }

                let optionsHtml = '';
                const keys = Object.keys(item.pilihan); 
                
                keys.forEach(key => {
                    const jawabanText = item.pilihan[key];
                    let btnClass = "option-btn";
                    
                    // Logika pewarnaan jika sudah dijawab (dari reload state)
                    if (hasAnswered) {
                        if (key.toUpperCase() === item.kunci.toUpperCase()) {
                            btnClass += " correct"; // Kunci selalu hijau
                        } else if (key === userAnswer && !isCorrect) {
                            btnClass += " wrong"; // Jawaban user yg salah merah
                        }
                    }

                    optionsHtml += `
                        <button onclick="checkAnswer(this, '${key}', '${item.kunci}', '${uniqueId}')" 
                            class="${btnClass}" data-key="${key}" ${hasAnswered ? 'disabled' : ''}>
                            <span class="option-label">${key}.</span>
                            <span>${jawabanText}</span>
                        </button>
                    `;
                });

                let feedbackHtml = '';
                if (hasAnswered) {
                    if (isCorrect) {
                        feedbackHtml = `<div class="alert alert-success py-2 px-3 small fw-bold mb-0"><i class="fas fa-check-circle me-1"></i> Jawaban Anda Benar!</div>`;
                    } else {
                        feedbackHtml = `<div class="alert alert-danger py-2 px-3 small fw-bold mb-0"><i class="fas fa-times-circle me-1"></i> Salah! Kunci: <strong>${item.kunci}</strong></div>`;
                    }
                }

                function getBadgeClass(paket) {
                    const p = paket ? paket.toUpperCase() : '';
                    if (p === 'A') return 'bg-paket-a';
                    if (p === 'B') return 'bg-paket-b';
                    if (p === 'C') return 'bg-paket-c';
                    return 'bg-secondary text-white';
                }

                html += `
                <div class="mobile-card ${hasAnswered ? 'answered' : ''}" id="${uniqueId}">
                    <div class="card-header-mobile">
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge bg-dark rounded-circle" style="width:24px; height:24px; display:flex; align-items:center; justify-content:center;">${index + 1}</span>
                            <span class="fw-bold text-secondary small">No. ${item.no_soal}</span>
                        </div>
                        <span class="badge-tipe ${getBadgeClass(item.paket)}">PAKET ${item.paket}</span>
                    </div>
                    <div class="p-3">
                        <p class="mb-3 text-dark fw-bold" style="font-size:1.05rem; line-height:1.6;">
                            ${item.soal}
                        </p>
                        <div class="options-container">
                            ${optionsHtml}
                        </div>
                        <div class="feedback-area mt-2 ${hasAnswered ? '' : 'd-none'}">
                            ${feedbackHtml}
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            document.getElementById('score-badge').innerText = `${correctCount} / ${answeredCount}`;
            window.scrollTo(0, 0);

            // Cek jika termuat ulang dalam keadaan sudah beres semua
            if (answeredCount === sessionData.questions.length && !sessionData.isFinished) {
                finishQuiz();
            }
        }

        // --- INTERAKSI JAWABAN ---
        function checkAnswer(btnElement, selectedKey, correctKey, questionId) {
            const card = document.getElementById(questionId);
            if (card.classList.contains('answered')) return;
            
            card.classList.add('answered');
            
            // Simpan jawaban ke session
            sessionData.answers[questionId] = selectedKey;
            saveSession();

            const allBtns = card.querySelectorAll('.option-btn');
            const feedbackArea = card.querySelector('.feedback-area');
            const isCorrect = (selectedKey.toUpperCase() === correctKey.toUpperCase());

            // Nonaktifkan semua tombol di soal ini
            allBtns.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                btnElement.classList.add('correct');
                feedbackArea.innerHTML = '<div class="alert alert-success py-2 px-3 small fw-bold mb-0"><i class="fas fa-check-circle me-1"></i> Jawaban Anda Benar!</div>';
            } else {
                btnElement.classList.add('wrong');
                feedbackArea.innerHTML = `<div class="alert alert-danger py-2 px-3 small fw-bold mb-0"><i class="fas fa-times-circle me-1"></i> Salah! Kunci: <strong>${correctKey}</strong></div>`;
                allBtns.forEach(btn => {
                    if (btn.getAttribute('data-key').toUpperCase() === correctKey.toUpperCase()) {
                        btn.classList.add('correct');
                    }
                });
            }

            feedbackArea.classList.remove('d-none');

            // Hitung ulang score untuk header
            updateScoreHeader();

            // Cek apakah selesai
            if (Object.keys(sessionData.answers).length === sessionData.questions.length) {
                finishQuiz();
            }
        }

        function updateScoreHeader() {
            let correctCount = 0;
            let answeredCount = Object.keys(sessionData.answers).length;

            sessionData.questions.forEach((item, index) => {
                const qId = `q-${index}`;
                if (sessionData.answers[qId] && sessionData.answers[qId].toUpperCase() === item.kunci.toUpperCase()) {
                    correctCount++;
                }
            });

            document.getElementById('score-badge').innerText = `${correctCount} / ${answeredCount}`;
        }

        // --- TIMER BEBAS RELOAD ---
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (sessionData.isFinished) {
                    clearInterval(timerInterval);
                    return;
                }
                
                const now = Date.now();
                const diffSeconds = Math.floor((now - sessionData.startTime) / 1000);
                
                const minutes = Math.floor(diffSeconds / 60);
                const seconds = diffSeconds % 60;

                const formatted = String(minutes).padStart(2, '0') + ":" + String(seconds).padStart(2, '0');
                document.getElementById("timer-badge").innerText = "⏱ " + formatted;
            }, 1000);
        }

        function getFormattedTimeElapsed() {
            const end = sessionData.endTime ? sessionData.endTime : Date.now();
            const diffSeconds = Math.floor((end - sessionData.startTime) / 1000);
            const minutes = Math.floor(diffSeconds / 60);
            const seconds = diffSeconds % 60;
            return `${minutes} Menit ${seconds} Detik`;
        }

        // --- SELESAI UJIAN ---
        function finishQuiz() {
            clearInterval(timerInterval);
            
            if (!sessionData.endTime) {
                sessionData.endTime = Date.now();
            }
            sessionData.isFinished = true;
            saveSession();

            window.scrollTo(0, 0);
            showResult();
        }

        function showResult() {
            document.getElementById('fab-action').classList.remove('d-none');
            const container = document.getElementById('main-container');
            
            let correctCount = 0;
            sessionData.questions.forEach((item, index) => {
                const qId = `q-${index}`;
                if (sessionData.answers[qId] && sessionData.answers[qId].toUpperCase() === item.kunci.toUpperCase()) {
                    correctCount++;
                }
            });

            const totalSoal = sessionData.questions.length;
            const nilaiAkhir = Math.round((correctCount / totalSoal) * 100);
            const waktuSelesai = getFormattedTimeElapsed();

            container.innerHTML = `
                <div class="result-card mb-4">
                    <h5 class="fw-bold mb-4">Ujian Selesai!</h5>
                    <div class="score-circle shadow-sm">
                        ${nilaiAkhir}
                    </div>
                    <p class="mb-1">Benar: <strong>${correctCount}</strong> dari ${totalSoal} Soal</p>
                    <p class="mb-3 small opacity-75">Waktu: ${waktuSelesai}</p>
                    <hr style="border-color: rgba(255,255,255,0.2);">
                    <div class="text-start">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Nama:</span>
                            <span class="fw-bold">${sessionData.nama}</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Sekolah:</span>
                            <span class="fw-bold">${sessionData.sekolah}</span>
                        </div>
                    </div>
                </div>
                <button onclick="renderQuiz()" class="btn btn-light w-100 border fw-bold mb-3 shadow-sm text-success py-3 rounded-pill">
                    <i class="fas fa-list me-2"></i> LIHAT KUNCI JAWABAN
                </button>
            `;
            
            // Set header fix
            document.getElementById('score-badge').innerText = `${correctCount} / ${totalSoal}`;
            document.getElementById('timer-badge').innerText = "Selesai";
        }

        // --- RESET / KEMBALI KE AWAL ---
        function resetQuizConfirm() {
            if (confirm("Apakah Anda yakin ingin menghapus progres dan mengulang dari awal?")) {
                localStorage.removeItem(SESSION_KEY);
                sessionData = null;
                clearInterval(timerInterval);
                showStartForm();
            }
        }

        function saveSession() {
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }

    </script>
</body>
</html>

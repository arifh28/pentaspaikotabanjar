<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCC Quiz Mobile - Ujian</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #14532d; --bg: #f8fafc; --card-bg: #ffffff; --wrong: #ef4444; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            padding-bottom: 30px; /* Kurangi padding bottom karena tidak ada floating button */
        }

        .arabic-text { font-family: 'Amiri', serif; font-size: 1.4rem; line-height: 2; direction: rtl; }

        .mobile-card {
            border: 2px solid transparent; /* Border default transparan */
            border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem; background: var(--card-bg); overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Class untuk menyorot soal yang belum diisi */
        .unanswered-warning {
            border-color: var(--wrong) !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2) !important;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .card-header-mobile {
            padding: 12px 15px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
        }

        .badge-tipe {
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            padding: 5px 8px; border-radius: 6px; letter-spacing: 0.5px;
        }
        .bg-paket-a { background: #dcfce7; color: #166534; }
        .bg-paket-b { background: #e0e7ff; color: #3730a3; }
        .bg-paket-c { background: #ffedd5; color: #9a3412; }

        .option-btn {
            width: 100%; text-align: left; padding: 12px 15px; margin-bottom: 8px;
            border: 1px solid #e2e8f0; border-radius: 10px; background: white;
            color: #334155; transition: all 0.2s; position: relative; display: flex; align-items: flex-start;
        }
        
        .option-btn:hover:not(:disabled) { background-color: #f8fafc; cursor: pointer; }
        .option-btn:active:not(:disabled) { transform: scale(0.99); }
        .option-btn:disabled { cursor: default; }

        .option-label { font-weight: 700; min-width: 25px; margin-right: 8px; color: var(--primary); }

        /* Warna netral saat dipilih, tidak menunjukkan benar/salah */
        .option-btn.selected { background-color: #e2e8f0; border-color: #94a3b8; color: #0f172a; }

        .divider-text {
            display: flex; align-items: center; text-align: center; color: #94a3b8; font-size: 11px;
            font-weight: 800; text-transform: uppercase; margin: 30px 0 10px 0; letter-spacing: 1px;
        }
        .divider-text::before, .divider-text::after { content: ''; flex: 1; border-bottom: 2px solid #e2e8f0; }
        .divider-text::before { margin-right: 1em; }
        .divider-text::after { margin-left: 1em; }
    </style>
</head>
<body>

    <div class="bg-white sticky-top shadow-sm px-3 py-3 d-flex justify-content-between align-items-center">
        <h6 class="m-0 fw-bold text-success">
            <i class="fas fa-book-open me-2"></i>LCC Digital
        </h6>

        <div class="d-flex gap-2 align-items-center">
            <span class="badge bg-warning text-dark border rounded-pill" id="timer-badge">⏱ 00:00</span>
            <span class="badge bg-light text-secondary border rounded-pill" id="score-badge">0 / 0 Terjawab</span>
        </div>
    </div>

    <div class="container mt-4 px-3" id="main-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const SESSION_KEY = 'lcc_quiz_session';
        let timerInterval = null;
        let sessionData = null;

        window.onload = () => {
            const savedSession = localStorage.getItem(SESSION_KEY);
            if (savedSession) {
                sessionData = JSON.parse(savedSession);
                if (sessionData.isFinished) {
                    window.location.href = 'hasiltest.html'; 
                } else {
                    renderQuiz();
                    startTimer();
                }
            } else {
                showStartForm();
            }
        };

        function showStartForm() {
            document.getElementById('timer-badge').innerText = "⏱ 00:00";
            document.getElementById('score-badge').innerText = "0 / 0 Terjawab";
            
            const html = `
                <div class="mobile-card p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-graduate fa-3x text-success mb-3"></i>
                        <h4 class="fw-bold">Selamat Datang</h4>
                        <p class="text-muted small">Silakan isi data diri sebelum memulai ujian 30 soal acak.</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">Nama Lengkap</label>
                        <input type="text" id="input-nama" class="form-control form-control-lg" placeholder="Masukkan nama..." required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-secondary">Asal Sekolah</label>
                        <input type="text" id="input-sekolah" class="form-control form-control-lg" placeholder="Contoh: SDN 1 Banjar" required>
                    </div>
                    <button onclick="startNewQuiz()" id="btn-start" class="btn btn-success btn-lg w-100 fw-bold rounded-pill shadow-sm">
                        <i class="fas fa-play me-2"></i> MULAI UJIAN
                    </button>
                </div>
            `;
            document.getElementById('main-container').innerHTML = html;
        }

        async function fetchQuestionsFromFile() {
            try {
                const response = await fetch('soal.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error("Gagal mengambil soal:", error);
                return null;
            }
        }

        function getRandomQuestions(sourceArray, count) {
            if (!sourceArray || sourceArray.length === 0) return [];
            return [...sourceArray].sort(() => 0.5 - Math.random()).slice(0, count);
        }

        async function startNewQuiz() {
            const nama = document.getElementById('input-nama').value.trim();
            const sekolah = document.getElementById('input-sekolah').value.trim();
            const btn = document.getElementById('btn-start');

            if (!nama || !sekolah) {
                alert("Mohon isi Nama dan Asal Sekolah terlebih dahulu!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menyiapkan Soal...';

            const databaseSoal = await fetchQuestionsFromFile();

            if (!databaseSoal) {
                alert("Gagal memuat soal. Pastikan file soal.json tersedia.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play me-2"></i> MULAI UJIAN';
                return;
            }

            const soalTerpilih = getRandomQuestions(databaseSoal, 30);
            
            if (soalTerpilih.length === 0) {
                alert("Data soal kosong di dalam file json.");
                return;
            }

            sessionData = {
                nama: nama,
                sekolah: sekolah,
                startTime: Date.now(),
                endTime: null,
                questions: soalTerpilih,
                answers: {},
                isFinished: false,
                isSaved: false
            };
            
            saveSession();
            renderQuiz();
            startTimer();
        }

        function renderQuiz() {
            const container = document.getElementById('main-container');
            
            let html = `
                <div class="alert alert-success border-0 shadow-sm mb-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="d-block text-success fw-bold">Peserta:</small>
                            <span class="fw-bold text-dark">${sessionData.nama}</span>
                        </div>
                        <div class="text-end">
                            <small class="d-block text-success fw-bold">Sekolah:</small>
                            <span class="fw-bold text-dark">${sessionData.sekolah}</span>
                        </div>
                    </div>
                </div>
                <div class="divider-text">30 Soal Acak (Sedang Berjalan)</div>
            `;

            let answeredCount = 0;

            sessionData.questions.forEach((item, index) => {
                const uniqueId = `q-${index}`;
                const hasAnswered = sessionData.answers.hasOwnProperty(uniqueId);
                const userAnswer = hasAnswered ? sessionData.answers[uniqueId] : null;

                if (hasAnswered) answeredCount++;

                let optionsHtml = '';
                const keys = Object.keys(item.pilihan); 
                
                keys.forEach(key => {
                    const jawabanText = item.pilihan[key];
                    let btnClass = "option-btn";
                    
                    if (hasAnswered && key === userAnswer) {
                        btnClass += " selected"; 
                    }

                    optionsHtml += `
                        <button onclick="checkAnswer(this, '${key}', '${uniqueId}')" 
                            class="${btnClass}" data-key="${key}">
                            <span class="option-label">${key}.</span>
                            <span>${jawabanText}</span>
                        </button>
                    `;
                });

                function getBadgeClass(paket) {
                    const p = paket ? paket.toUpperCase() : '';
                    if (p === 'A') return 'bg-paket-a';
                    if (p === 'B') return 'bg-paket-b';
                    if (p === 'C') return 'bg-paket-c';
                    return 'bg-secondary text-white';
                }

                html += `
                <div class="mobile-card ${hasAnswered ? 'answered' : ''}" id="${uniqueId}">
                    <div class="card-header-mobile">
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge bg-dark rounded-circle" style="width:24px; height:24px; display:flex; align-items:center; justify-content:center;">${index + 1}</span>
                            <span class="fw-bold text-secondary small">No. ${item.no_soal}</span>
                        </div>
                        <span class="badge-tipe ${getBadgeClass(item.paket)}">PAKET ${item.paket}</span>
                    </div>
                    <div class="p-3">
                        <p class="mb-3 text-dark fw-bold" style="font-size:1.05rem; line-height:1.6;">
                            ${item.soal}
                        </p>
                        <div class="options-container">
                            ${optionsHtml}
                        </div>
                    </div>
                </div>`;
            });

            // Tambahkan Tombol Kirim di Paling Bawah
            html += `
                <div class="mt-4 mb-5 pb-5 px-2">
                    <button onclick="submitQuiz()" class="btn btn-success btn-lg w-100 fw-bold rounded-pill shadow-lg" style="padding: 16px;">
                        <i class="fas fa-paper-plane me-2"></i> KIRIM JAWABAN
                    </button>
                </div>
            `;

            container.innerHTML = html;
            document.getElementById('score-badge').innerText = `${answeredCount} / ${sessionData.questions.length} Terjawab`;
            window.scrollTo(0, 0);
        }

        function checkAnswer(btnElement, selectedKey, questionId) {
            const card = document.getElementById(questionId);
            
            // Hapus peringatan merah jika sebelumnya belum dijawab
            card.classList.remove('unanswered-warning');
            
            card.classList.add('answered');
            sessionData.answers[questionId] = selectedKey;
            saveSession();

            // Reset semua tombol pada soal ini agar tidak ada yang selected
            const allBtns = card.querySelectorAll('.option-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('selected');
            });
            
            // Tandai jawaban yang baru dipilih (warna abu-abu)
            btnElement.classList.add('selected');

            updateScoreHeader();
        }

        function updateScoreHeader() {
            let answeredCount = Object.keys(sessionData.answers).length;
            document.getElementById('score-badge').innerText = `${answeredCount} / ${sessionData.questions.length} Terjawab`;
        }

        // Fungsi Validasi & Kirim Jawaban
        function submitQuiz() {
            const totalSoal = sessionData.questions.length;
            const dijawab = Object.keys(sessionData.answers).length;

            if (dijawab < totalSoal) {
                // Ada yang belum diisi
                alert(`Masih ada ${totalSoal - dijawab} soal yang belum dijawab!\nPeriksa kembali soal yang ditandai dengan garis merah.`);
                
                // Tandai soal yang belum dijawab
                sessionData.questions.forEach((item, index) => {
                    const uniqueId = `q-${index}`;
                    const card = document.getElementById(uniqueId);
                    if (!sessionData.answers.hasOwnProperty(uniqueId)) {
                        card.classList.add('unanswered-warning');
                    } else {
                        card.classList.remove('unanswered-warning');
                    }
                });
                
                // Otomatis scroll ke soal pertama yang belum dijawab
                const firstUnanswered = document.querySelector('.unanswered-warning');
                if (firstUnanswered) {
                    // Beri offset sedikit agar tidak tertutup header
                    const y = firstUnanswered.getBoundingClientRect().top + window.scrollY - 100;
                    window.scrollTo({ top: y, behavior: 'smooth' });
                }
                return; // Batalkan proses kirim
            }

            // Jika sudah diisi semua
            if (confirm("Apakah Anda yakin ingin mengirim semua jawaban sekarang?\nPastikan jawaban Anda sudah benar.")) {
                finishQuiz();
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (sessionData.isFinished) {
                    clearInterval(timerInterval);
                    return;
                }
                
                const now = Date.now();
                const diffSeconds = Math.floor((now - sessionData.startTime) / 1000);
                
                const minutes = Math.floor(diffSeconds / 60);
                const seconds = diffSeconds % 60;

                const formatted = String(minutes).padStart(2, '0') + ":" + String(seconds).padStart(2, '0');
                document.getElementById("timer-badge").innerText = "⏱ " + formatted;
            }, 1000);
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            
            if (!sessionData.endTime) {
                sessionData.endTime = Date.now();
            }
            sessionData.isFinished = true;
            saveSession();

            // Arahkan ke halaman hasil
            window.location.href = 'hasiltest.html';
        }

        function saveSession() {
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }
    </script>
</body>
</html>

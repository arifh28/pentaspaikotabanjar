<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Balapan LCC - IFP</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; /* Mencegah scroll pada IFP */
            user-select: none; /* Mencegah teks terblok saat disentuh cepat */
            background-color: #0f172a;
        }

        /* --- AREA BALAPAN (ATAS) --- */
        .track-area {
            height: 30vh;
            background-color: #1e293b;
            display: flex;
            flex-direction: column;
            position: relative;
            border-bottom: 6px solid #fbbf24;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .lane {
            flex: 1;
            position: relative;
            border-bottom: 3px dashed #475569;
            display: flex;
            align-items: center;
        }
        .lane:last-child { border-bottom: none; }
        
        .player-avatar {
            height: 70%;
            position: absolute;
            left: 2%; /* Posisi awal */
            transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* Efek membal saat maju */
            z-index: 5;
            filter: drop-shadow(4px 4px 5px rgba(0,0,0,0.5));
        }

        .finish-line {
            position: absolute;
            right: 5%;
            top: 0; bottom: 0; width: 20px;
            background: repeating-linear-gradient(to bottom, #ffffff 0, #ffffff 15px, #000000 15px, #000000 30px);
            z-index: 2;
            border-left: 2px solid #ef4444;
        }

        /* --- AREA SOAL (BAWAH) --- */
        .quiz-area {
            height: 70vh;
            display: flex;
            background: #f8fafc;
        }
        .player-col {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 4px solid #cbd5e1;
        }
        .player-col:last-child { border-right: none; }
        
        /* Warna Khusus Tiap Pemain */
        .p1-zone { background-color: #fef2f2; } /* Merah */
        .p2-zone { background-color: #eff6ff; } /* Biru */
        .p3-zone { background-color: #f0fdf4; } /* Hijau */

        .score-badge {
            font-size: 1.5rem; font-weight: 900;
            padding: 10px 20px; border-radius: 50px;
            text-align: center; margin-bottom: 15px;
            color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .bg-p1 { background-color: #ef4444; }
        .bg-p2 { background-color: #3b82f6; }
        .bg-p3 { background-color: #22c55e; }

        .question-box {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: center;
            border: 2px solid #e2e8f0;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 40%; /* Porsi ruang untuk tombol */
        }
        
        .opt-btn {
            border: 2px solid #cbd5e1;
            background: white;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #334155;
            padding: 15px;
            transition: 0.1s;
            box-shadow: 0 4px 0 #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
        }
        .opt-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cbd5e1;
        }
        
        /* Efek Umpan Balik Jawaban */
        .opt-btn.correct { background-color: #22c55e !important; color: white !important; border-color: #16a34a !important; box-shadow: 0 4px 0 #16a34a !important; }
        .opt-btn.wrong { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; box-shadow: 0 4px 0 #dc2626 !important; }

        /* --- OVERLAY START / WIN --- */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white;
        }
        .btn-giant {
            font-size: 2.5rem; font-weight: 900;
            padding: 20px 50px; border-radius: 50px;
            background: #fbbf24; border: none; color: #78350f;
            box-shadow: 0 10px 0 #d97706; cursor: pointer;
            transition: 0.2s;
        }
        .btn-giant:active { transform: translateY(10px); box-shadow: 0 0 0 #d97706; }
        
        .winner-text { font-size: 5rem; font-weight: 900; text-transform: uppercase; text-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="overlay" id="start-overlay">
        <h1 class="mb-3 fw-bold" style="font-size: 4rem;">RACING QUIZ LCC</h1>
        <p class="mb-5 fs-4 text-light">Siapa yang pertama mencapai 40 soal benar, dia pemenangnya!</p>
        <button class="btn-giant" onclick="startGame()">MULAI BALAPAN</button>
    </div>

    <div class="overlay d-none" id="win-overlay">
        <h1 class="winner-text text-warning" id="win-title">PLAYER 1 MENANG!</h1>
        <button class="btn-giant" onclick="location.reload()">MAIN LAGI</button>
    </div>

    <div class="track-area">
        <div class="finish-line"></div>
        <div class="lane">
            <span class="badge bg-danger ms-3 fs-5 z-3 position-absolute">P1</span>
            <img src="p1.png" class="player-avatar" id="avatar-1" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3204/3204121.png'">
        </div>
        <div class="lane">
            <span class="badge bg-primary ms-3 fs-5 z-3 position-absolute">P2</span>
            <img src="p2.png" class="player-avatar" id="avatar-2" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3204/3204121.png'">
        </div>
        <div class="lane">
            <span class="badge bg-success ms-3 fs-5 z-3 position-absolute">P3</span>
            <img src="p3.png" class="player-avatar" id="avatar-3" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3204/3204121.png'">
        </div>
    </div>

    <div class="quiz-area">
        <div class="player-col p1-zone" id="zone-1">
            <div class="score-badge bg-p1" id="score-1">0 / 40</div>
            <div class="question-box" id="q-text-1">Menyiapkan soal...</div>
            <div class="options-container" id="opts-1"></div>
        </div>

        <div class="player-col p2-zone" id="zone-2">
            <div class="score-badge bg-p2" id="score-2">0 / 40</div>
            <div class="question-box" id="q-text-2">Menyiapkan soal...</div>
            <div class="options-container" id="opts-2"></div>
        </div>

        <div class="player-col p3-zone" id="zone-3">
            <div class="score-badge bg-p3" id="score-3">0 / 40</div>
            <div class="question-box" id="q-text-3">Menyiapkan soal...</div>
            <div class="options-container" id="opts-3"></div>
        </div>
    </div>

    <script>
        const WIN_SCORE = 40;
        let isGameOver = false;

        // Data masing-masing pemain
        let players = [
            { id: 1, score: 0, pool: [], currentIndex: 0, isLocked: false },
            { id: 2, score: 0, pool: [], currentIndex: 0, isLocked: false },
            { id: 3, score: 0, pool: [], currentIndex: 0, isLocked: false }
        ];

        async function fetchQuestions() {
            try {
                const res = await fetch('soal.json');
                const data = await res.json();
                return data;
            } catch (e) {
                alert("Gagal memuat soal.json. Pastikan file tersedia.");
                return [];
            }
        }

        async function startGame() {
            const btn = document.querySelector('#start-overlay button');
            btn.innerText = "MEMUAT DATA...";
            btn.disabled = true;

            const allData = await fetchQuestions();
            if (allData.length === 0) return;

            // Acak seluruh soal
            const shuffled = allData.sort(() => 0.5 - Math.random());
            
            // Bagi soal menjadi 3 kelompok agar tidak mendapat soal yang sama persis di waktu bersamaan
            const chunkSize = Math.floor(shuffled.length / 3);
            players[0].pool = shuffled.slice(0, chunkSize);
            players[1].pool = shuffled.slice(chunkSize, chunkSize * 2);
            players[2].pool = shuffled.slice(chunkSize * 2, chunkSize * 3);

            // Hilangkan overlay
            document.getElementById('start-overlay').classList.add('d-none');

            // Render soal pertama untuk ketiga pemain
            renderQuestion(1);
            renderQuestion(2);
            renderQuestion(3);
        }

        function renderQuestion(pid) {
            const player = players[pid - 1];
            
            // Jika soal habis sebelum menang, reset index (mengulang soal miliknya)
            if (player.currentIndex >= player.pool.length) {
                player.currentIndex = 0;
            }

            const currentQ = player.pool[player.currentIndex];
            
            document.getElementById(`q-text-${pid}`).innerHTML = currentQ.soal;
            
            let optsHtml = '';
            const keys = Object.keys(currentQ.pilihan);
            
            // Acak posisi pilihan ganda agar A B C D tidak selalu statis (Opsional, tapi bagus untuk mencegah hafalan letak)
            const shuffledKeys = keys.sort(() => 0.5 - Math.random());

            shuffledKeys.forEach(k => {
                // Gunakan backtick untuk passing string
                optsHtml += `
                    <button class="opt-btn" onclick="handleAnswer(${pid}, '${k}', '${currentQ.kunci}', this)">
                        <span class="me-2 text-secondary">${k}.</span> ${currentQ.pilihan[k]}
                    </button>
                `;
            });

            document.getElementById(`opts-${pid}`).innerHTML = optsHtml;
            player.isLocked = false; // Buka kunci tombol
        }

        function handleAnswer(pid, selectedKey, correctKey, btnElement) {
            if (isGameOver) return;
            
            const player = players[pid - 1];
            if (player.isLocked) return; // Cegah spam tap ganda
            
            player.isLocked = true;
            const isCorrect = (selectedKey.toUpperCase() === correctKey.toUpperCase());

            // Nonaktifkan semua tombol di zona pemain ini
            const allBtns = document.getElementById(`opts-${pid}`).querySelectorAll('.opt-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.classList.add('correct');
                player.score++;
                
                // Update Badge Angka
                document.getElementById(`score-${pid}`).innerText = `${player.score} / ${WIN_SCORE}`;
                
                // Gerakkan Avatar (Kalkulasi persentase, mentok di 90% letak finish line)
                const movePercent = (player.score / WIN_SCORE) * 90;
                document.getElementById(`avatar-${pid}`).style.left = `${movePercent}%`;

                // Cek Menang
                if (player.score >= WIN_SCORE) {
                    triggerWin(pid);
                    return;
                }
            } else {
                btnElement.classList.add('wrong');
                // Beri tahu mana yang benar secara otomatis
                allBtns.forEach(b => {
                    if(b.getAttribute('onclick').includes(`'${correctKey}'`)) {
                        b.classList.add('correct');
                    }
                });
            }

            // Lanjut ke soal berikutnya setelah jeda 1 detik agar pemain bisa melihat hasilnya
            setTimeout(() => {
                player.currentIndex++;
                renderQuestion(pid);
            }, 1000);
        }

        function triggerWin(pid) {
            isGameOver = true;
            const overlay = document.getElementById('win-overlay');
            const title = document.getElementById('win-title');
            
            let color = "";
            if(pid === 1) color = "text-danger";
            if(pid === 2) color = "text-primary";
            if(pid === 3) color = "text-success";

            title.className = `winner-text ${color}`;
            title.innerText = `PLAYER ${pid} MENANG!`;
            
            overlay.classList.remove('d-none');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cek Hafal Per Surat - MHQ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #14532d; --bg: #f8fafc; --card-bg: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); padding-bottom: 100px; }
        .quran-text { font-family: 'Amiri', serif; font-size: 26px; line-height: 2.2; direction: rtl; text-align: right; color: #1e293b; }
        .nomor-ayat { display: inline-block; font-family: sans-serif; font-size: 0.75rem; width: 28px; height: 28px; line-height: 28px; text-align: center; border: 1px solid #cbd5e1; border-radius: 50%; color: #64748b; margin-right: 8px; vertical-align: middle; background: #f8fafc; }
        
        .mobile-card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 1rem; background: var(--card-bg); overflow: hidden; padding: 15px; }
        .note-section { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 15px; }
        
        /* Floating Button */
        .fab-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; }
        .btn-generate { width: 100%; padding: 14px; border-radius: 50px; font-weight: 700; background: var(--primary); border: none; box-shadow: 0 8px 20px rgba(20, 83, 45, 0.3); color: white; }
        
        /* Loading */
        #loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Checkbox Kustom */
        .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="bg-white sticky-top shadow-sm px-3 py-3 d-flex justify-content-between align-items-center">
        <h6 class="m-0 fw-bold text-success"><a href="index.html" class="text-success text-decoration-none"><i class="fas fa-arrow-left me-2"></i>Kembali</a></h6>
        <a href="catatan_hafalan.html" class="badge bg-warning text-dark border rounded-pill text-decoration-none px-3 py-2">Lihat Rekap</a>
    </div>

    <div class="container mt-4 px-3">
        <div class="mobile-card">
            <h5 class="fw-bold mb-3 text-success"><i class="fas fa-quran me-2"></i>Pilih Surat</h5>
            <select id="surah-select" class="form-select form-select-lg mb-3 shadow-sm font-weight-bold"></select>
            <button onclick="loadSurah()" class="btn btn-success w-100 fw-bold py-2 rounded-3">
                <i class="fas fa-book-reader me-2"></i> MULAI MUROJA'AH
            </button>
        </div>

        <div id="soal-container"></div>
    </div>

    <div id="loading" class="d-none">
        <div class="spinner-border text-success mb-3" role="status"></div>
        <p class="small fw-bold text-secondary">Sedang Memuat Surat...</p>
    </div>

    <div class="fab-container d-none" id="save-btn-container">
        <button onclick="simpanCatatan()" class="btn-generate">
            <i class="fas fa-save me-2"></i>SIMPAN CATATAN
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const LOCAL_STORAGE_KEY = 'mhq_catatan_hafalan';
        
        // Daftar Surat dari 84 - 114
        const surahList = [
            {id: 84, name: "Al-Insyiqaq"}, {id: 85, name: "Al-Buruj"}, {id: 86, name: "At-Tariq"}, {id: 87, name: "Al-A'la"}, {id: 88, name: "Al-Gasyiyah"}, {id: 89, name: "Al-Fajr"}, {id: 90, name: "Al-Balad"}, {id: 91, name: "Asy-Syams"}, {id: 92, name: "Al-Lail"}, {id: 93, name: "Ad-Duha"}, {id: 94, name: "Asy-Syarh"}, {id: 95, name: "At-Tin"}, {id: 96, name: "Al-'Alaq"}, {id: 97, name: "Al-Qadr"}, {id: 98, name: "Al-Bayyinah"}, {id: 99, name: "Az-Zalzalah"}, {id: 100, name: "Al-'Adiyat"}, {id: 101, name: "Al-Qari'ah"}, {id: 102, name: "At-Takasur"}, {id: 103, name: "Al-'Asr"}, {id: 104, name: "Al-Humazah"}, {id: 105, name: "Al-Fil"}, {id: 106, name: "Quraisy"}, {id: 107, name: "Al-Ma'un"}, {id: 108, name: "Al-Kausar"}, {id: 109, name: "Al-Kafirun"}, {id: 110, name: "An-Nasr"}, {id: 111, name: "Al-Lahab"}, {id: 112, name: "Al-Ikhlas"}, {id: 113, name: "Al-Falaq"}, {id: 114, name: "An-Nas"}
        ];

        window.onload = () => {
            const select = document.getElementById('surah-select');
            surahList.forEach(s => {
                let option = document.createElement('option');
                option.value = s.id;
                option.text = `${s.id}. ${s.name}`;
                select.appendChild(option);
            });
        };

        async function loadSurah() {
            const surahId = document.getElementById('surah-select').value;
            const container = document.getElementById('soal-container');
            const loading = document.getElementById('loading');
            const saveBtn = document.getElementById('save-btn-container');

            loading.classList.remove('d-none');
            container.innerHTML = '';
            saveBtn.classList.add('d-none');

            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${surahId}`);
                const json = await res.json();
                const surah = json.data;

                // Tarik data yang pernah disimpan sebelumnya di localStorage
                let savedData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || {};
                let existingNotes = savedData[surahId] ? savedData[surahId].ayat : {};

                let html = `
                    <div class="alert alert-success border-0 shadow-sm mt-3">
                        <h5 class="fw-bold mb-1 text-center">${surah.namaLatin}</h5>
                        <p class="text-center small mb-0">${surah.arti} • ${surah.jumlahAyat} Ayat</p>
                    </div>
                `;

                surah.ayat.forEach(a => {
                    let no = a.nomorAyat;
                    let isChecked = existingNotes[no] && existingNotes[no].hafal ? 'checked' : '';
                    let noteValue = existingNotes[no] && existingNotes[no].catatan ? existingNotes[no].catatan : '';

                    html += `
                        <div class="mobile-card ayat-item" data-ayat="${no}">
                            <div class="quran-text mb-3">
                                ${a.teksArab} <span class="nomor-ayat">${no}</span>
                            </div>
                            <div class="note-section">
                                <div class="form-check form-switch mb-2">
                                    <input class="form-check-input input-hafal fs-5" type="checkbox" id="check-${no}" ${isChecked}>
                                    <label class="form-check-label fw-bold mt-1 text-success" for="check-${no}">Hafal Lancar & Sesuai Tajwid</label>
                                </div>
                                <input type="text" class="form-control input-catatan" placeholder="Catatan perbaikan (Cth: Idgham kurang dengung...)" value="${noteValue}">
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                saveBtn.classList.remove('d-none');
                
            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="alert alert-danger text-center">Gagal memuat surat. Periksa internet Anda.</div>`;
            } finally {
                loading.classList.add('d-none');
            }
        }

        function simpanCatatan() {
            const surahSelect = document.getElementById('surah-select');
            const surahId = surahSelect.value;
            const surahName = surahSelect.options[surahSelect.selectedIndex].text.split('. ')[1];

            const ayatItems = document.querySelectorAll('.ayat-item');
            let notesObj = {};

            ayatItems.forEach(item => {
                const noAyat = item.getAttribute('data-ayat');
                const isHafal = item.querySelector('.input-hafal').checked;
                const catatanStr = item.querySelector('.input-catatan').value.trim();

                // Simpan jika dichecklist ATAU jika ada catatan teksnya
                if (isHafal || catatanStr !== "") {
                    notesObj[noAyat] = {
                        hafal: isHafal,
                        catatan: catatanStr
                    };
                }
            });

            // Ambil data lama
            let savedData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || {};
            
            // Perbarui dengan data surat ini
            savedData[surahId] = {
                namaLatin: surahName,
                ayat: notesObj
            };

            // Simpan kembali
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(savedData));

            // Lempar ke halaman rekap
            window.location.href = 'catatan_hafalan.html';
        }
    </script>
</body>
</html>

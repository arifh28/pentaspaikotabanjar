<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentas PAI Jabar 2026 - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #14532d; --secondary: #16a34a; --bg: #f0fdf4; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #1e293b; }
        .hero { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 4rem 1rem; border-radius: 0 0 40px 40px; text-align: center; margin-bottom: 3rem; }
        .card-menu { border: none; border-radius: 20px; transition: 0.3s; height: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-decoration: none; display: block; background: white; }
        .card-menu:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(22, 163, 74, 0.2); border-bottom: 5px solid var(--secondary); }
        .icon-box { width: 60px; height: 60px; background: #dcfce7; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 1rem; }
        .card-title { color: var(--primary); font-weight: 700; }
        .card-text { color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="hero">
        <h1 class="fw-bold display-5">Pentas PAI 2026</h1>
        <p class="lead opacity-75">Petunjuk Teknis Tingkat Provinsi Jawa Barat</p>
    </header>

    <div class="container mb-5">
        <div class="row g-4">
            <div class="col-6 col-md-4 col-lg-3">
                <a href="lcc.html" class="card card-menu p-4">
                    <div class="icon-box"><i class="fas fa-brain"></i></div>
                    <h5 class="card-title">LCC-PAI</h5>
                    <p class="card-text">Cerdas Cermat PAI</p>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="ldc.html" class="card card-menu p-4">
                    <div class="icon-box"><i class="fas fa-microphone-alt"></i></div>
                    <h5 class="card-title">LDC</h5>
                    <p class="card-text">Lomba Da'i Cilik</p>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="mtq.html" class="card card-menu p-4">
                    <div class="icon-box"><i class="fas fa-quran"></i></div>
                    <h5 class="card-title">MTQ</h5>
                    <p class="card-text">Musabaqah Tilawatil Qur'an</p>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="mhq.html" class="card card-menu p-4">
                    <div class="icon-box"><i class="fas fa-heart"></i></div>
                    <h5 class="card-title">MHQ</h5>
                    <p class="card-text">Musabaqah Hifdzil Qur'an</p>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="lki.html" class="card card-menu p-4">
                    <div class="icon-box"><i class="fas fa-pen-nib"></i></div>
                    <h5 class="card-title">LKI</h5>
                    <p class="card-text">Lomba Kaligrafi Islam</p>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="lpsb.html" class="card card-menu p-4">
                    <div class="icon-box"><i class="fas fa-praying-hands"></i></div>
                    <h5 class="card-title">LPSB</h5>
                    <p class="card-text">Praktik Salat Berjama'ah</p>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="lsqr.html" class="card card-menu p-4">
                    <div class="icon-box"><i class="fas fa-drum"></i></div>
                    <h5 class="card-title">LSQR</h5>
                    <p class="card-text">Seni Qasidah Rebana</p>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="lpa.html" class="card card-menu p-4">
                    <div class="icon-box"><i class="fas fa-mosque"></i></div>
                    <h5 class="card-title">LPA</h5>
                    <p class="card-text">Lomba Praktik Adzan</p>
                </a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

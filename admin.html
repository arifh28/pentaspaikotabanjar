<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Log Pengunjung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .admin-header { background: #14532d; color: white; padding: 2rem 0; border-radius: 0 0 30px 30px; margin-bottom: 2rem; }
        .card-tabel { border: none; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="admin-header text-center shadow-sm">
        <h2 class="fw-bold m-0"><i class="fas fa-chart-line me-2"></i>Log Aktivitas Pengunjung</h2>
        <p class="opacity-75 mb-0">Dashboard Monitoring Pentas PAI Banjar 2026</p>
    </div>

    <div class="container mb-5">
        <div class="card card-tabel p-4">
            <div class="table-responsive">
                <table id="tabelPengunjung" class="table table-striped table-hover w-100 align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th width="5%">No</th>
                            <th width="60%">Halaman Diakses</th>
                            <th width="35%">Waktu Akses</th>
                        </tr>
                    </thead>
                    <tbody id="data-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Inisialisasi Supabase
        const SUPABASE_URL = 'https://oisrtlcxdwgvzrxrlzpb.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pc3J0bGN4ZHdndnpyeHJsenBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMwMzM3OTEsImV4cCI6MjA3ODYwOTc5MX0.aI162olkIydnJrRxLnC0NsBU9umySmd2nWSTt8Hc1ec'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Ambil Data dari Supabase dan masukkan ke DataTables
        async function loadAdminData() {
            const { data, error } = await _supabase
                .from('pengunjung')
                .select('*')
                .order('waktu', { ascending: false }); // Urutkan dari yang terbaru

            if (error) {
                console.error('Error fetching data:', error);
                alert('Gagal mengambil data dari server.');
                return;
            }

            let htmlContent = '';
            data.forEach((row, index) => {
                // Format Waktu ke lokal Indonesia
                const waktuLokal = new Date(row.waktu).toLocaleString('id-ID', {
                    year: 'numeric', month: 'long', day: 'numeric', 
                    hour: '2-digit', minute:'2-digit', second:'2-digit'
                });

                htmlContent += `
                    <tr>
                        <td class="text-center">${index + 1}</td>
                        <td class="fw-semibold text-success">${row.halaman}</td>
                        <td><span class="badge bg-light text-dark border"><i class="far fa-clock me-1"></i> ${waktuLokal}</span></td>
                    </tr>
                `;
            });

            // Masukkan baris ke dalam tabel
            document.getElementById('data-body').innerHTML = htmlContent;

            // Inisialisasi DataTables setelah data masuk
            $('#tabelPengunjung').DataTable({
                "language": {
                    "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json" // Terjemahan Bahasa Indonesia
                }
            });
        }

        // Jalankan fungsi saat halaman siap
        $(document).ready(function() {
            loadAdminData();
        });
    </script>
</body>
</html>
